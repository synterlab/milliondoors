kind = "web"
previewPath = "/"
title = "Million Doors"
version = "1.0.0"
id = "artifacts/milliondoors"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20837

[services.development]
run = "pnpm --filter @workspace/milliondoors run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/milliondoors", "run", "build" ]
publicDir = "artifacts/milliondoors/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20837"
BASE_PATH = "/"
